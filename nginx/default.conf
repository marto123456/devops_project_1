events {}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:5000;
    }

    # 1. REDIRECT ALL HTTP (PORT 80) TO HTTPS
    server {
        listen 80;
        server_name martins.noblehall.com www.martins.noblehall.com;
        
        return 301 https://$host$request_uri;
    }

    # 2. SECURE HTTPS SERVER (PORT 443)
    server {
        listen 443 ssl;
        server_name martins.noblehall.com www.martins.noblehall.com;

        # SSL Certificates Paths (Points inside the mounted Docker volume)
        ssl_certificate /etc/letsencrypt/live/martins.noblehall.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/martins.noblehall.com/privkey.pem;

        # Optimized SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Frontend Routing
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API Routing
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}