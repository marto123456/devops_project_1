events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:5000;
    }

    upstream grafana_server {
        server grafana:3000;
    }

    upstream prometheus_server {
        server prometheus:9090;
    }

    # 1. LET'S ENCRYPT VALIDATION + GLOBAL HTTP TO HTTPS REDIRECT
    server {
        listen 80;
        server_name 
            martins.noblehall.com 
            grafana.noblehall.com 
            prometheus.noblehall.com;
        
        # Vital for Let's Encrypt automated challenge validation (Certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Catch everything else and force HTTPS rewrite
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. MAIN APPLICATION SERVER (Frontend + Backend API)
    server {
        listen 443 ssl;
        server_name martins.noblehall.com www.martins.noblehall.com;

        # Shared Expanded SSL Certificate Paths
        ssl_certificate /etc/letsencrypt/live/martins.noblehall.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/martins.noblehall.com/privkey.pem;

        # Optimized SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # SECURITY HEADERS
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin;
        add_header X-XSS-Protection "1; mode=block";

        # Frontend Routing
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API Routing
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. SECURE GRAFANA REVERSE PROXY
    server {
        listen 443 ssl;
        server_name grafana.noblehall.com;

        ssl_certificate /etc/letsencrypt/live/martins.noblehall.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/martins.noblehall.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://grafana_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket Support (Required for Grafana live panels)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # 4. SECURE PROMETHEUS REVERSE PROXY
    server {
        listen 443 ssl;
        server_name prometheus.noblehall.com;

        ssl_certificate /etc/letsencrypt/live/martins.noblehall.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/martins.noblehall.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://prometheus_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}