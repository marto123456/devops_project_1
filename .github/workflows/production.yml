name: Production DevSecOps Pipeline

on:
  push:
    branches:
      - main

  # Manual trigger (Run workflow button)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running manual deployment'
        required: false
        default: 'Redeploying the application to production'

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  # 📌 Metadata job (captures trigger info + reason)
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Capture deployment metadata
        run: |
          echo "===================================="
          echo "🚀 Production Pipeline Triggered"
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Commit: ${{ github.sha }}"
          echo "===================================="

      - name: Write GitHub Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Event: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Actor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Reason: ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # 🔐 Security stage
  security:
    needs: metadata
    uses: ./.github/workflows/security.yml

  # 🏗️ Build stage
  build:
    needs: security
    uses: ./.github/workflows/build.yml
    secrets:
      REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  # 📋 Compliance stage
  compliance:
    needs: build
    uses: ./.github/workflows/compliance.yml

  # 🚀 Deploy stage
  deploy:
    needs: compliance
    uses: ./.github/workflows/deploy.yml
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}