name: Build And Push Containers

on:
  workflow_call:
    secrets:
      REGISTRY_USER:
        required: true
      REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  build-and-push:
    name: 🐳 Build and Push Containers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Registry
        uses: docker/login-action@v3
        with:
          registry: registry.noblehall.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      ####################################################
      # Frontend
      ####################################################
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            registry.noblehall.com/leperroquet-frontend:latest
            registry.noblehall.com/leperroquet-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ####################################################
      # Backend
      ####################################################
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            registry.noblehall.com/leperroquet-backend:latest
            registry.noblehall.com/leperroquet-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ####################################################
      # Trivy Image Scan
      ####################################################
      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: registry.noblehall.com/leperroquet-frontend:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: registry.noblehall.com/leperroquet-backend:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1