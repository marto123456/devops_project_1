name: Production DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-gate:
    name: 🛡️ Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ####################################################
      # Secret Scanning
      ####################################################
      - name: Scan For Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./

      ####################################################
      # Dockerfile Linting
      ####################################################
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: error

      ####################################################
      # Node Setup + Cache
      ####################################################
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      ####################################################
      # Frontend Validation
      ####################################################
      - name: Frontend Security & Build Validation
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev || true
          npm run build

      ####################################################
      # Backend Validation
      ####################################################
      - name: Backend Security & Validation
        working-directory: backend
        run: |
          npm ci
          npm audit --omit=dev || true

      ####################################################
      # Trivy Filesystem Scan
      ####################################################
      - name: Trivy Frontend Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: frontend
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Trivy Backend Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

  build-and-scan:
    name: 🐳 Build and Scan Containers
    needs: security-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      ####################################################
      # Build Frontend Image
      ####################################################
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: |
            registry.noblehall.com/leperroquet-frontend:latest
            registry.noblehall.com/leperroquet-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ####################################################
      # Build Backend Image
      ####################################################
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: |
            registry.noblehall.com/leperroquet-backend:latest
            registry.noblehall.com/leperroquet-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ####################################################
      # Trivy Image Scan
      ####################################################
      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: registry.noblehall.com/leperroquet-frontend:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: registry.noblehall.com/leperroquet-backend:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      ####################################################
      # SBOM Generation
      ####################################################
      - name: Generate Frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: registry.noblehall.com/leperroquet-frontend:${{ github.sha }}
          output-file: frontend-sbom.spdx.json

      - name: Generate Backend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: registry.noblehall.com/leperroquet-backend:${{ github.sha }}
          output-file: backend-sbom.spdx.json

      ####################################################
      # Upload SBOM Artifacts
      ####################################################
      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files-${{ github.sha }}
          retention-days: 30
          path: |
            frontend-sbom.spdx.json
            backend-sbom.spdx.json

      ####################################################
      # Registry Login
      ####################################################
      - name: Login Registry
        uses: docker/login-action@v3
        with:
          registry: registry.noblehall.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      ####################################################
      # Push Verified Images
      ####################################################
      - name: Push Images
        run: |
          docker push registry.noblehall.com/leperroquet-frontend:latest
          docker push registry.noblehall.com/leperroquet-frontend:${{ github.sha }}

          docker push registry.noblehall.com/leperroquet-backend:latest
          docker push registry.noblehall.com/leperroquet-backend:${{ github.sha }}

  deploy:
    name: 🚀 Deploy To VPS
    needs: build-and-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Zero-Downtime Deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ~/devops1

            echo "Updating repository..."
            git pull origin main

            echo "Authenticating with registry..."
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.noblehall.com \
              -u "${{ secrets.REGISTRY_USER }}" \
              --password-stdin

            echo "Pulling verified images..."
            docker compose -f docker/docker-compose.yml pull

            echo "Updating running services..."
            docker compose -f docker/docker-compose.yml up -d

            echo "Removing unused images..."
            docker image prune -f

            echo "Deployment completed successfully."
            docker ps