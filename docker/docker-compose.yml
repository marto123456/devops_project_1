version: "3.9"

services:
  frontend:
    build:
      context: ../frontend
    expose:
      - "3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    networks:
      - app-network

  backend:
    build:
      context: ../backend
    expose:
      - "5000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge